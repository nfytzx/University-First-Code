<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <link rel="stylesheet" href="register.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="register-container">
        <h1>用户注册</h1>
        <form class="register-form" action="" method="post">
            
            <!-- 用户名 -->
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名 (3-20个字符)" 
                       minlength="3" maxlength="20" required>
                <div class="error-message" id="username-error"></div>
            </div>

            <!-- 邮箱 -->
            <div class="form-group">
                <label for="email">邮箱地址</label>
                <input type="email" id="email" name="email" placeholder="请输入邮箱地址" required>
                <div class="error-message" id="email-error"></div>
            </div>

            <!-- 手机号 -->
            <div class="form-group">
                <label for="phone">手机号码</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入手机号码" pattern="[0-9]{11}" required>
                <div class="error-message" id="phone-error"></div>
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码 (至少6位)" 
                       minlength="6" required>
                <div class="password-strength">
                    <div class="strength-meter" id="password-strength-meter"></div>
                </div>
                <div class="error-message" id="password-error"></div>
            </div>

            <!-- 确认密码 -->
            <div class="form-group">
                <label for="confirm-password">确认密码</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="请再次输入密码" required>
                <div class="error-message" id="confirm-password-error"></div>
            </div>

            <!-- 用户协议 -->
            <div class="terms-agreement">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    我已阅读并同意 <a href="terms.html" target="_blank">《用户服务协议》</a> 和 
                    <a href="privacy.html" target="_blank">《隐私政策》</a>
                </label>
            </div>

            <!-- 按钮组 -->
            <div class="form-buttons">
                <button type="submit" class="register-btn">
                    <i class="fas fa-user-plus"></i> 立即注册
                </button>
                <button type="button" class="cancel-btn" onclick="window.location.href='denglu.html'">
                    <i class="fas fa-times"></i> 取消
                </button>
            </div>

            <!-- 已有账号 -->
            <div class="login-link">
                <a href="denglu.html">
                    <i class="fas fa-sign-in-alt"></i> 已有账号？立即登录
                </a>
            </div>
        </form>
    </div>

   
</body>

</html>
