<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐网站</title>
    <style>
        /* 基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #1A1A2E;
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部布局 */
        header {
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-content {
            text-align: center;
        }

        h1 {
            color: #FF6B6B;
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

       

        /* 主要内容布局 */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        
        /* 推荐歌曲布局 */
        .song-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 25px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: white;
            border-bottom: 2px solid #FF6B6B;
            padding-bottom: 10px;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .song-info h4 {
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .song-info p {
            color: #b3b3b3;
            font-size: 0.9rem;
        }

        .song-time {
            color: #b3b3b3;
        }

        /* 热门推荐布局 */
        .hot-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 25px;
        }

        .hot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .hot-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            padding: 15px;
        }

        .hot-item:nth-child(3) {
            grid-column: span 2;
            background: rgba(255, 209, 102, 0.1);
        }

        .hot-title {
            font-size: 1rem;
            margin-bottom: 8px;
        }

        .hot-artist {
            color: #b3b3b3;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        /* 底部播放器布局 */
        .player-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.9);
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .player-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 15px;
            min-width: 200px;
        }

        .now-playing-cover {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            background: #4ECDC4;
        }

        .player-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

       

        .play-pause-btn {
            background: #FF6B6B;
            width: 50px;
            height: 50px;
        }

        .progress-bar {
            width: 300px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 0 10px;
        }

        .progress {
            height: 100%;
            background: #FF6B6B;
            width: 30%;
            border-radius: 2px;
        }

        /* 响应式布局 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .player-content {
                flex-direction: column;
                gap: 15px;
            }
            
            .progress-bar {
                width: 200px;
            }
            
            .hot-grid {
                grid-template-columns: 1fr;
            }
            
            .hot-item:nth-child(3) {
                grid-column: span 1;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .hero-title {
                font-size: 1.5rem;
            }
            
            .song-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .player-controls {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header>
        <div class="container">
            <div class="header-content">
                <h1>音乐网站</h1>
              
            </div>
        </div>
    </header>

    <!-- 主要内容 -->
    <main class="container">
        
        <!-- 主要内容布局 -->
        <div class="main-content">
            <!-- 推荐歌曲 -->
            <section class="song-section">
                <h3 class="section-title">推荐歌曲</h3>
                <div class="song-list">
                    <!-- 歌曲1 -->
                    <div class="song-item">
                        <div class="song-info">
                            <h4>1902年波兰民谣</h4>
                            <p>因为斯洛文尼亚而闻名</p>
                        </div>
                        <div class="song-time">3:30 / 0:00</div>
                    </div>
                    
                    <!-- 歌曲2 -->
                    <div class="song-item">
                        <div class="song-info">
                            <h4>八哥·快歌手</h4>
                            <p>Mitsuko</p>
                        </div>
                        <div class="song-time">3:00 / 0:00</div>
                    </div>
                    
                    <!-- 歌曲3 -->
                    <div class="song-item">
                        <div class="song-info">
                            <h4>Hangulin</h4>
                            <p>Larry Green</p>
                        </div>
                        <div class="song-time">3:00 / 0:00</div>
                    </div>
                </div>
            </section>

            <!-- 热门推荐 -->
            <section class="hot-section">
                <h3 class="section-title">热门推荐</h3>
                <div class="hot-grid">
                    <!-- 推荐1 -->
                    <div class="hot-item">
                        <div class="hot-title">We will remember you</div>
                        <div class="song-time">4:10 / 1:20</div>
                    </div>
                    
                    <!-- 推荐2 -->
                    <div class="hot-item">
                        <div class="hot-title">望比沙・ラジー</div>
                        <div class="song-time">4:10 / 1:20</div>
                    </div>
                    
                    <!-- 推荐3 -->
                    <div class="hot-item">
                        <div class="hot-title">【欧美Live】吉他现场版</div>
                        <div class="hot-artist">Laurie</div>
                        <div class="song-time">3:50 / 0:40</div>
                    </div>
                    
                    <!-- 推荐4 -->
                    <div class="hot-item">
                        <div class="hot-title">超甜咖啡</div>
                        <div class="song-time">4:10 / 1:20</div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 播放器 -->
    <footer class="player-bar">
        <div class="container">
            <div class="player-content">
                <!-- 当前播放 -->
                <div class="now-playing">
                    <div class="now-playing-cover"></div>
                    <div>
                        <h4>1902年波兰民谣</h4>
                        <p>因斯洛文尼亚而闻名</p>
                    </div>
                </div>
                
                <!-- 播放控制 -->
                <div class="player-controls">
                    <button>◀◀</button>
                    <button class="play-pause-btn">▶</button>
                    <button>▶▶</button>
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                    <div class="song-time">1:20 / 3:30</div>
                </div>
                
                
            </div>
        </div>
    </footer>
</body>
</html>
