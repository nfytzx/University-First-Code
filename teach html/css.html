<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>个人信息注册页面</title> 
  <style>
    *{
      margin: 0;
      padding: 0;
    }
    body{
      background: lightgrey;
      font-size: 14px; 
    }
    .container{
      width: 600px;
      /* border:2px solid red; */
      margin: 0 auto;
      text-align: center;
      background: white;
      border-radius: 5px;
    }
    /* #circle{
      display: inline-block;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: green;
      color: white;
      line-height: 30px;
    } */
    .logo span{
      display: inline-block;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: green;
      color: white;
      line-height: 30px;
    }
    .container .login-link a{
      color: green;
    }
    /* .logo{
      margin: 20px auto;

    }
    h1{
      margin-bottom: 20px;
    }
    .login-link{
      margin-bottom: 20px;
    } */
    .logo,h1,.login-link{
      margin-bottom: 20px;
    }
    .logo{
      margin-top: 20px;
    }
    .row{
      width: 90%;
      background: lightblue;
      margin: 10px auto;
    }
    button{
      width: 90%;
      height: 50px;
      background: blue;
      color: white;
      margin: 15px auto;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover{
      background: red;
    }
  </style> 
</head>
<body>
  <div class="container">
   <!--  <div class="logo">
      <span id="circle">by</span>trend 
       <span>by</span>trend
    </div>-->
    <h1>Welcome to ByTrend!</h1>
    <div class="login-link">
      <span>Already have an account?</span> <a href="#">Log in</a>
    </div>
    <form action="#" class="row">
      <div class="form-group">
        <label for="first-name">First name<span style="color: red;">*</span></label>
        <input type="text" id="first-name" name="first-name" value="Alexander" required>
      </div>
      <div class="form-group">
        <label for="last-name">Last name<span style="color: red;">*</span></label>
        <input type="text" id="last-name" name="last-name" placeholder="Your surname" required>
      </div>
      <div class="form-group">
        <label for="birth-date">Birth date<span style="color: red;">*</span></label>
        <input type="text" id="birth-date" name="birth-date" value="06.12.1992" placeholder="DD.MM.YYYY" required>
        <span class="calendar-icon">??</span>
      </div>
      <div class="form-group">
        <label>Gender<span style="color: red;">*</span></label>
        <div class="radio-group">
          <label>
            <input type="radio" name="gender" value="female" checked> Female
          </label>
          <label>
            <input type="radio" name="gender" value="male"> Male
          </label>
        </div>
      </div>
      <div class="form-group">
        <label for="skype">Skype</label>
        <input type="text" id="skype" name="skype" placeholder="Your login Skype">
      </div>
      <div class="form-group">
        <label for="promo">Promo</label>
        <input type="text" id="promo" name="promo" placeholder="Your promo">
      </div>
      <button type="submit">Continue →</button>
    </form>
  </div>
</body>
</html>
