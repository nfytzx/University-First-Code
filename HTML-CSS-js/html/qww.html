<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试网页AI-主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f4f4;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background-color: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .nav {
            background-color: #d32f2f;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .nav ul {
            display: flex;
            list-style: none;
            justify-content: center;
        }
        
        .nav li {
            flex: 1;
            text-align: center;
        }
        
        .nav a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px 0;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        .nav a:hover {
            background-color: #b71c1c;
        }
        
        .content {
            background-color: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin: 20px 0;
            min-height: 400px;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            background-color: #333;
            color: white;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        .footer a {
            color: #4fc3f7;
            text-decoration: none;
        }
        
        .footer a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 768px) {
            .nav ul {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>测试网页</h1>
        </header>
        
        <nav class="nav">
            <ul>
                <li><a href="index1.html">首页</a></li>
                <li><a href="qww.html" target="_blank">讨论</a></li>
                <li><a href="https://ak.hypergryph.com/" target="_blank">更多</a></li>
            </ul>
        </nav>
        
        <main class="content">
            <p>这里是网页的主要内容区域。您可以在这里添加文本、图片或其他内容。</p>
            <!-- 您可以在这里添加更多内容 -->
        </main>
        
        <footer class="footer">
            <p>Copyright © 2025 测试网页. All Rights Reserved.</p>
            <p>邮箱联系：<a href="mailto:nfy159@gmail.com">nfy159@gmail.com</a></p>
        </footer>
    </div>
</body>
</html>
